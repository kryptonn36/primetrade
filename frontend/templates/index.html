<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskAPI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    nav {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .brand { font-weight: 600; font-size: 1rem; }
    nav .nav-right { display: flex; align-items: center; gap: 1rem; }
    #nav-user { font-size: 0.85rem; color: #666; }
    #btn-logout {
      font-size: 0.82rem;
      padding: 5px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: none;
      cursor: pointer;
      display: none;
    }
    #btn-logout:hover { background: #f5f5f5; }

    .page { display: none; }
    .page.active { display: block; }

    .auth-wrap {
      max-width: 380px;
      margin: 80px auto;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 2rem;
    }

    .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 1px solid #e5e5e5; }
    .tab-btn {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: #888;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.82rem; color: #555; margin-bottom: 4px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: #999; }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .toggle-password {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #555;
      margin-top: -0.35rem;
      margin-bottom: 0.9rem;
      user-select: none;
    }
    .toggle-password input {
      width: auto;
      margin: 0;
      padding: 0;
    }

    .btn {
      width: 100%;
      padding: 9px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { width: auto; padding: 5px 12px; font-size: 0.82rem; }
    .btn-danger { background: #dc2626; }
    .btn-ghost { background: none; color: #1a1a1a; border: 1px solid #ddd; }
    .btn-ghost:hover { background: #f5f5f5; opacity: 1; }

    .msg {
      font-size: 0.82rem;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 1rem;
      display: none;
    }
    .msg.error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; display: block; }
    .msg.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; display: block; }

    .dashboard-wrap { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .dashboard-header h2 { font-size: 1.1rem; font-weight: 600; }

    .task-form-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .task-form-card h3 {
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .form-row { display: flex; gap: 0.75rem; }
    .form-row .form-group { flex: 1; }
    .form-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }

    .filter-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn {
      padding: 4px 12px;
      border: 1px solid #ddd;
      border-radius: 999px;
      background: none;
      font-size: 0.8rem;
      cursor: pointer;
      color: #555;
      font-family: inherit;
    }
    .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    .task-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .task-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 0.9rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      transition: border-color 0.1s;
    }
    .task-card:hover { border-color: #ccc; }
    .task-info { flex: 1; }
    .task-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 3px; }
    .task-desc { font-size: 0.82rem; color: #666; margin-bottom: 6px; }
    .task-meta { display: flex; align-items: center; gap: 0.5rem; }

    .badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-todo         { background: #f1f5f9; color: #475569; }
    .badge-in_progress  { background: #fef3c7; color: #92400e; }
    .badge-done         { background: #dcfce7; color: #166534; }

    .task-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

    .inline-edit-form { display: none; }
    .inline-edit-form.open { display: block; margin-top: 0.75rem; }

    .empty-state {
      text-align: center;
      padding: 3rem 0;
      color: #999;
      font-size: 0.9rem;
    }

    .admin-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      margin-top: 1rem;
    }
    .admin-subtitle {
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .admin-list {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      min-height: 80px;
      background: #fff;
      overflow: hidden;
    }
    .admin-item {
      padding: 0.75rem;
      border-bottom: 1px solid #f1f1f1;
    }
    .admin-item:last-child { border-bottom: none; }
    .admin-item-title {
      font-size: 0.88rem;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .admin-item-meta {
      font-size: 0.8rem;
      color: #666;
    }
    .admin-item-actions {
      margin-top: 0.5rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    #loading { display: none; text-align: center; padding: 2rem; color: #999; font-size: 0.9rem; }
  </style>
</head>
<body>

<nav>
  <span class="brand">TaskAPI</span>
  <div class="nav-right">
    <span id="nav-user"></span>
    <button id="btn-logout">logout</button>
  </div>
</nav>

<!-- Auth page -->
<div id="page-auth" class="page active">
  <div class="auth-wrap">
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">sign in</button>
      <button class="tab-btn" data-tab="register">register</button>
    </div>

    <div id="tab-login">
      <div id="login-msg" class="msg"></div>
      <div class="form-group">
        <label>username</label>
        <input id="login-username" type="text" placeholder="your_username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>password</label>
        <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <label class="toggle-password">
        <input id="login-show-password" type="checkbox" />
        show password
      </label>
      <button class="btn" id="btn-login">sign in</button>
    </div>

    <div id="tab-register" style="display:none">
      <div id="register-msg" class="msg"></div>
      <div class="form-group">
        <label>username</label>
        <input id="reg-username" type="text" placeholder="your_username" />
      </div>
      <div class="form-group">
        <label>email</label>
        <input id="reg-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>password</label>
        <input id="reg-password" type="password" placeholder="min 8 characters" />
      </div>
      <label class="toggle-password">
        <input id="reg-show-password" type="checkbox" />
        show password
      </label>
      <button class="btn" id="btn-register">create account</button>
    </div>
  </div>
</div>

<!-- Dashboard page -->
<div id="page-dashboard" class="page">
  <div class="dashboard-wrap">
    <div class="dashboard-header">
      <h2 id="dashboard-title">my tasks</h2>
    </div>

    <div id="user-task-form" class="task-form-card">
      <h3>new task</h3>
      <div id="task-create-msg" class="msg"></div>
      <div class="form-group">
        <label>title</label>
        <input id="task-title" type="text" placeholder="what needs to be done?" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>description (optional)</label>
          <textarea id="task-desc" placeholder="add some details..."></textarea>
        </div>
        <div class="form-group" style="flex: 0 0 140px">
          <label>status</label>
          <select id="task-status">
            <option value="todo">todo</option>
            <option value="in_progress">in progress</option>
            <option value="done">done</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-sm" id="btn-create-task">add task</button>
      </div>
    </div>

    <div id="user-filter-row" class="filter-row">
      <button class="filter-btn active" data-filter="all">all</button>
      <button class="filter-btn" data-filter="todo">todo</button>
      <button class="filter-btn" data-filter="in_progress">in progress</button>
      <button class="filter-btn" data-filter="done">done</button>
    </div>

    <div id="loading">loading...</div>
    <div id="task-list" class="task-list"></div>

    <div id="admin-panel" class="task-form-card" style="display:none; margin-top:1.5rem;">
      <h3>admin</h3>
      <div id="admin-msg" class="msg"></div>
      <div class="form-actions" style="margin-top:0; margin-bottom:1rem;">
        <button class="btn btn-sm" id="btn-admin-refresh-users">refresh users</button>
        <button class="btn btn-sm btn-ghost" id="btn-admin-refresh-tasks">refresh all tasks</button>
      </div>

      <div class="admin-grid">
        <div>
          <h4 class="admin-subtitle">users</h4>
          <div id="admin-users" class="admin-list"></div>
        </div>

        <div>
          <h4 class="admin-subtitle">all tasks</h4>
          <div id="admin-tasks" class="admin-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
